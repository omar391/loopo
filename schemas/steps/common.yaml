$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/common.yaml
title: Loopship V3 Step Schema Common Definitions
$defs:
  string_array:
    type: array
    items:
      type: string
  durable_implication:
    type: object
    additionalProperties: false
    required:
      - record_kind
      - text
      - links
      - expected_system_update
      - confidence
    properties:
      record_kind:
        enum:
          - rule
          - behaviour
          - claim
          - assumption
          - limitation
          - area
          - actor
          - unit
          - interface
          - flow
          - store
          - asset
          - schema
          - document
          - artifact
          - evidence
          - preference
          - learning
          - observation
      text:
        type: string
      links:
        $ref: loopship://schemas/system.yaml#/$defs/links
      expected_system_update:
        enum:
          - none
          - object_update
          - assertion_update
          - resource_update
          - memory_update
          - doc_update
          - system_update
      confidence:
        enum:
          - low
          - medium
          - high
  system_context:
    type: object
    additionalProperties: false
    required:
      - relevant_object_refs
      - relevant_assertion_refs
      - relevant_resource_refs
      - relevant_memory_refs
      - durable_implications
    properties:
      relevant_object_refs:
        $ref: "#/$defs/string_array"
      relevant_assertion_refs:
        $ref: "#/$defs/string_array"
      relevant_resource_refs:
        $ref: "#/$defs/string_array"
      relevant_memory_refs:
        $ref: "#/$defs/string_array"
      durable_implications:
        type: array
        items:
          $ref: "#/$defs/durable_implication"
  schema_ref:
    oneOf:
      - type: string
      - type: object
        additionalProperties: false
        required:
          - schema_path
        properties:
          schema_path:
            type: string
  embedded_schema:
    type: object
    additionalProperties: true
    minProperties: 1
    not:
      required:
        - schema_path
    properties:
      $schema:
        type: string
      $id:
        type: string
      title:
        type: string
      type: {}
      required:
        type: array
        items:
          type: string
      properties:
        type: object
  schema_ref_or_embedded:
    oneOf:
      - $ref: "#/$defs/schema_ref"
      - $ref: "#/$defs/embedded_schema"
  command:
    type: object
    additionalProperties: false
    required:
      - cmd
      - args
    properties:
      cmd:
        type: string
      args:
        type: array
        items:
          type: string
  compact_step:
    type: object
    additionalProperties: false
    required:
      - id
      - instructions
    properties:
      id:
        type: string
      instructions:
        type: string
  task_graph_task:
    type: object
    additionalProperties: false
    required:
      - title
      - acceptance
    properties:
      id:
        type: string
      task_id:
        type: string
      title:
        type: string
      name:
        type: string
      type:
        enum:
          - coding
          - general
      status:
        type: string
      dependencies:
        $ref: "#/$defs/string_array"
      depends_on:
        $ref: "#/$defs/string_array"
      scope_files:
        $ref: "#/$defs/string_array"
      scope:
        $ref: "#/$defs/string_array"
      spec_refs:
        $ref: "#/$defs/string_array"
      specs:
        $ref: "#/$defs/string_array"
      context_refs:
        $ref: "#/$defs/string_array"
      context:
        $ref: "#/$defs/string_array"
      branch_ref:
        type: string
      worktree_path:
        type: string
      child_wtree:
        type: string
      concurrency_group:
        type: string
      merge_target:
        type: string
      merge_lease_id:
        type: string
      merge_commit:
        type: string
      system_impact_ref:
        type: string
      acceptance:
        oneOf:
          - type: string
          - $ref: "#/$defs/string_array"
      acceptance_criteria:
        oneOf:
          - type: string
          - $ref: "#/$defs/string_array"
  question:
    type: object
    additionalProperties: false
    required:
      - id
      - question
    properties:
      id:
        type: string
      question:
        type: string
      impact:
        type: string
      default:
        type: string
  answer:
    oneOf:
      - type: string
      - type: object
        additionalProperties: false
        required:
          - answer
        properties:
          id:
            type: string
          question_id:
            type: string
          question:
            type: string
          answer:
            type: string
          accepted_default:
            type: boolean
  evidence:
    type: object
    additionalProperties: false
    required:
      - type
      - ref
    properties:
      type:
        type: string
      ref:
        type: string
      summary:
        type: string
      status:
        type: string
  check:
    type: object
    additionalProperties: false
    required:
      - name
      - status
    properties:
      name:
        type: string
      status:
        enum:
          - passed
          - failed
          - skipped
      summary:
        type: string
      ref:
        type: string
  acceptance_trace:
    type: object
    additionalProperties: false
    required:
      - acceptance
      - status
    properties:
      acceptance:
        type: string
      status:
        enum:
          - passed
          - failed
          - skipped
      evidence:
        type: array
        items:
          $ref: "#/$defs/evidence"
      summary:
        type: string
  risk:
    type: object
    additionalProperties: false
    required:
      - risk
    properties:
      risk:
        type: string
      severity:
        enum:
          - low
          - medium
          - high
      mitigation:
        type: string
      status:
        type: string
  child:
    type: object
    additionalProperties: false
    required:
      - task_id
      - title
      - child_wtree
      - branch_ref
      - worktree_path
      - acceptance
      - actions
    properties:
      task_id:
        type: string
      title:
        type: string
      child_wtree:
        type: string
      parent_wtree:
        type: string
      parent_task_id:
        type: string
      parent_context_ref:
        type: string
      branch_ref:
        type: string
      worktree_path:
        type: string
      merge_target:
        type: string
      merge_target_worktree:
        type: string
      acceptance:
        type: string
      actions:
        type: object
        additionalProperties: false
        required:
          - init
        properties:
          init:
            $ref: "#/$defs/command"
