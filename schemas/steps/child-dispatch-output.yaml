$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/child-dispatch-output.yaml
title: Loopship V3 Child Dispatch Output
type: object
additionalProperties: false
required:
  - task
  - answer_schema
  - children
properties:
  schema_version:
    const: 3
  kind:
    const: quest_step
  schema_path:
    const: schemas/steps/child-dispatch-output.yaml
  wtree:
    type: string
  quest_id:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  current_stage:
    type: string
  summary:
    type: string
  task:
    allOf:
      - $ref: common.yaml#/$defs/compact_step
      - type: object
        properties:
          id:
            const: executing
  answer_schema:
    $ref: common.yaml#/$defs/schema_ref_or_embedded
  children:
    type: array
    items:
      $ref: common.yaml#/$defs/child
