$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/step-output.yaml
title: Loopship V3 Step Output
type: object
additionalProperties: false
required:
  - task
  - answer_schema
properties:
  schema_version:
    const: 3
  kind:
    const: quest_step
  schema_path:
    const: schemas/steps/step-output.yaml
  wtree:
    type: string
  quest_id:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  current_stage:
    type: string
  summary:
    type: string
  task:
    $ref: common.yaml#/$defs/compact_step
  answer_schema:
    $ref: common.yaml#/$defs/schema_ref_or_embedded
  requirements:
    type: array
    items:
      type: string
