$schema: https://json-schema.org/draft/2020-12/schema
$id: schemas/steps/init-output.yaml
title: Loopship V3 Init Route Output
type: object
additionalProperties: false
required:
  - schema_version
  - kind
  - schema_path
  - request
  - runtime
  - flow_id
  - flow_version
  - candidates
  - new_quest
properties:
  schema_version:
    const: 3
  kind:
    const: init_route
  schema_path:
    const: schemas/steps/init-output.yaml
  request:
    type: string
  runtime:
    type: string
  flow_id:
    type: string
  flow_version:
    type: integer
  candidates:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - wtree
        - score
        - description
        - state
        - current_step
        - flow_id
        - flow_version
        - worktree_path
        - command
      properties:
        wtree:
          type: string
        score:
          type: number
        description:
          type: string
        state:
          type: string
        current_step:
          type: string
        flow_id:
          type: string
        flow_version:
          type: integer
        worktree_path:
          type: string
        command:
          $ref: common.yaml#/$defs/command
  new_quest:
    type: object
    additionalProperties: false
    required:
      - suggested_wtree
      - command
      - input
    properties:
      suggested_wtree:
        type: string
      command:
        $ref: common.yaml#/$defs/command
      input:
        type: object
        additionalProperties: false
        required:
          - action
          - wtree
          - flow_id
          - request
        properties:
          action:
            const: create_quest
          wtree:
            type: string
          flow_id:
            type: string
          request:
            type: string
