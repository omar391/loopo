document:
  dsl: 1.0.3
  namespace: loopship-steps
  name: questions
  version: 1.0.0
  summary: Submit grouped user answers for the current clarification round.
  metadata:
    loopship:
      kind: step-workflow
      stepId: questions
do:
  - questions:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/step-output.yaml
      metadata:
        loopship:
          stepId: questions
          handler: questions
          inputStep: questions
          summary: Submit grouped user answers for the current clarification round.
          instructions: >-
            # Loopship Questions Step


            Act as a top-class clarification recorder for Loopship. Treat this
            instruction

            block as the questions step's system prompt: capture human-provided
            answers

            exactly, preserve identifiers, and return only the schema-valid
            `questions`

            callback.


            ## Step-Local Callback Contract


            This step is reusable across flows. The orchestrator owns flow
            transitions

            and decides which step, if any, follows this callback. Produce only
            the JSON

            payload that matches this step's current `output_schema`, then
            submit it

            through `commands.next`; do not shape output for a guessed
            successor.


            Record answers from the most recent grouped clarification round.
            Preserve the

            original question ids, carry forward any previously recorded
            explicit

            defaults, and submit answers through the emitted `commands.next`
            with the `questions` step schema. Do not auto-answer unresolved

            questions; wait for human-provided answers before submitting this
            callback.
          resultSchemaPath: schemas/steps/step-output.yaml
      output:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/questions-input.yaml
      call: fastflow.afn.core.request.input
      with: {}
