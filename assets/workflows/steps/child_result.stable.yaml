document:
  dsl: 1.0.3
  namespace: loopship-steps
  name: child-result
  version: 1.0.0
  summary: Submit the result of a completed child quest back to the parent flow.
  metadata:
    catalog:
      tags:
        - loopship
        - step
        - child_result
input:
  schema:
    format: json
    document:
      $ref: ../../../schemas/steps/step-output.yaml
output:
  schema:
    format: json
    document:
      type: object
      additionalProperties: true
  as: ${state.steps.child_result.action}
do:
  - child_result:
      input:
        schema:
          format: json
          document:
            $ref: ../../../schemas/steps/step-output.yaml
        from: ${inputs}
      metadata:
        description: |-
          # Loopship Child Result Step

          Act as a top-class parent quest reconciler for Loopship. Treat this
          instruction block as the child result step's system prompt: inspect canonical
          child evidence, submit one schema-valid `child_result` callback, and do not
          perform the child's implementation work inline in the parent session.

          ## Step-Local Callback Contract

          This step is reusable across flows. The orchestrator owns flow transitions
          and decides which step, if any, follows this callback. Produce only the JSON
          payload that matches this step's current `output_schema`, then submit it
          through `commands.next`; do not shape output for a guessed successor.

          Submit `status: passed` only after the child quest is archived and the
          child's landed commit is present in the planned merge target. Include the
          exact `task_id`, `child_wtree`, evidence refs, and `merge_commit`.

          Submit `status: blocked` or `status: failed` with evidence when the child
          cannot complete. Do not mark another task, invent a merge commit, or report
          success from agent prose without canonical child state.
        inference: handoff
        validation:
          post:
            kind: static
            ok: true
            evidence:
              source: loopship.workflow.yaml
        verification:
          assertions:
            - id: loopship_native_step_contract
              kind: behaviour
              statement: The Loopship Fastflow-native workflow step is structurally valid.
              check:
                script:
                  kind: js
                  code: |
                    return { ok: true, evidence: { source: 'loopship.workflow.yaml' } };
      output:
        schema:
          format: json
          document:
            type: object
            additionalProperties: true
        as: ${action}
      call: fastflow.afn.core.request.input
      with:
        body:
          instruction: |-
            # Loopship Child Result Step

            Act as a top-class parent quest reconciler for Loopship. Treat this
            instruction block as the child result step's system prompt: inspect canonical
            child evidence, submit one schema-valid `child_result` callback, and do not
            perform the child's implementation work inline in the parent session.

            ## Step-Local Callback Contract

            This step is reusable across flows. The orchestrator owns flow transitions
            and decides which step, if any, follows this callback. Produce only the JSON
            payload that matches this step's current `output_schema`, then submit it
            through `commands.next`; do not shape output for a guessed successor.

            Submit `status: passed` only after the child quest is archived and the
            child's landed commit is present in the planned merge target. Include the
            exact `task_id`, `child_wtree`, evidence refs, and `merge_commit`.

            Submit `status: blocked` or `status: failed` with evidence when the child
            cannot complete. Do not mark another task, invent a merge commit, or report
            success from agent prose without canonical child state.
          request:
            schema:
              type: object
              additionalProperties: true
              properties:
                step:
                  type: object
                  additionalProperties: true
                inputs:
                  $ref: ../../../schemas/steps/step-output.yaml
                state:
                  type: object
                  additionalProperties: true
                args:
                  type: object
                  additionalProperties: true
              required:
                - step
                - inputs
            build:
              kind: js
              using:
                - inputs
                - state
                - args
              code: >-
                return {
                  step: {"id":"child_result","handler":"child_result","summary":"Submit the result of a completed child quest back to the parent flow.","input_step":"child_result","result_schema":"schemas/steps/step-output.yaml"},
                  inputs,
                  state,
                  args
                };
          answer:
            schema:
              $ref: ../../../schemas/steps/child-result-input.yaml
