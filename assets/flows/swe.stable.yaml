      run:
        script:
          language: js
          code: |-
            const flow = {"id":"swe","default_stage":"planning","stages":[{"id":"planning","step":"plan","transitions":{"questions":"awaiting_user_answers","planned":"plan_review"},"transition_key":{"kind":"js","code":"return Array.isArray(payload.questions) && payload.questions.length ? \"questions\" : \"planned\";\n"}},{"id":"awaiting_user_answers","step":"questions","transitions":{"answered":"planning"},"transition_key":{"kind":"static","value":"answered"}},{"id":"plan_review","step":"task_graph","transitions":{"approved":"task_graph_ready","child_approved":"validating","rejected":"planning"},"transition_key":{"kind":"js","code":"if (payload.approved === false) return \"rejected\";\nreturn String(tasks.prompt || \"\").trim().toLowerCase().startsWith(\"loopship: execute child task \")\n  ? \"child_approved\"\n  : \"approved\";\n"}},{"id":"task_graph_ready","step":"executing","transitions":{"complete":"validating","partial":"task_graph_ready"},"transition_key":{"kind":"js","code":"const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];\nconst done = new Set([\"child_merged\", \"child_archived\", \"done\", \"merged\"]);\nconst terminal = items.length > 0 && items.every((task) => {\n  if (!done.has(String(task.status || \"\"))) return false;\n  if ([\"child_archived\", \"child_merged\"].includes(String(task.status || \"\"))) {\n    return Boolean(String(task.merge_commit || \"\").trim());\n  }\n  return true;\n});\nreturn terminal ? \"complete\" : \"partial\";\n"}},{"id":"executing","step":"executing","transitions":{"complete":"validating","partial":"executing"},"transition_key":{"kind":"js","code":"const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];\nconst done = new Set([\"child_merged\", \"child_archived\", \"done\", \"merged\"]);\nconst terminal = items.length > 0 && items.every((task) => {\n  if (!done.has(String(task.status || \"\"))) return false;\n  if ([\"child_archived\", \"child_merged\"].includes(String(task.status || \"\"))) {\n    return Boolean(String(task.merge_commit || \"\").trim());\n  }\n  return true;\n});\nreturn terminal ? \"complete\" : \"partial\";\n"}},{"id":"validating","step":"validation","transitions":{"passed":"verification_pending","failed":"task_graph_ready","failed_child":"validating"},"transition_key":{"kind":"js","code":"if (payload.status === \"passed\") return \"passed\";\nreturn String(tasks.prompt || \"\").trim().toLowerCase().startsWith(\"loopship: execute child task \")\n  ? \"failed_child\"\n  : \"failed\";\n"}},{"id":"verification_pending","step":"verification","transitions":{"passed":"system_update_pending","failed":"validating"},"transition_key":{"kind":"js","code":"return payload.status === \"passed\" ? \"passed\" : \"failed\";\n"}},{"id":"system_update_pending","step":"system_update","transitions":{"updated":"landing_ready"},"transition_key":{"kind":"static","value":"updated"}},{"id":"landing_ready","step":"landing","transitions":{"landed":"archived","blocked":"landing_ready"},"transition_key":{"kind":"js","code":"return payload.status === \"blocked\" ? \"blocked\" : \"landed\";\n"}},{"id":"replanning","step":"plan","transitions":{"planned":"plan_review","questions":"awaiting_user_answers"},"transition_key":{"kind":"js","code":"return Array.isArray(payload.questions) && payload.questions.length ? \"questions\" : \"planned\";\n"}},{"id":"archived","step":"archived","transitions":{},"transition_key":{"kind":"static","value":"continue"}}],"subflows":[{"id":"replanning","type":"in_flow_detour","starts_at":"replanning","returns_to":"plan_review","trigger":"replan"},{"id":"add_task","type":"in_flow_detour","starts_at":"replanning","returns_to":"task_graph_ready","trigger":"add_task"},{"id":"child_task","type":"spawned_quest","starts_at":"task_graph_ready","returns_to":"task_graph_ready","trigger":"children[].commands.init","result_step":"child_result","flow_id":"swe"}]};
            const stageTaskNames = {"planning":"stage_planning","awaiting_user_answers":"stage_awaiting_user_answers","plan_review":"stage_plan_review","task_graph_ready":"stage_task_graph_ready","executing":"stage_executing","validating":"stage_validating","verification_pending":"stage_verification_pending","system_update_pending":"stage_system_update_pending","landing_ready":"stage_landing_ready","replanning":"stage_replanning","archived":"stage_archived"};
            const inputStepByStage = {"planning":"plan","awaiting_user_answers":"questions","plan_review":"task_graph","task_graph_ready":"child_result","executing":"child_result","validating":"validation","verification_pending":"verification","system_update_pending":"system_update","landing_ready":"landing","replanning":"plan","archived":"archived"};
            function object(value) {
              return value && typeof value === "object" && !Array.isArray(value) ? value : {};
            }
            function decisionPayload(value) {
              const out = object(value);
              const decision = object(out.decision);
              if (Object.prototype.hasOwnProperty.call(decision, "decision")) return decision.decision;
              if (Object.keys(decision).length) return decision;
              if (Object.prototype.hasOwnProperty.call(out, "decision")) return out.decision;
              return out;
            }
            function tasksAfterPayload(tasks, payload, stepId) {
              if (stepId !== "child_result") return tasks;
              const taskId = String(payload.task_id || payload.id || "");
              const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];
              if (!taskId || !items.length) return tasks;
              return {
                ...tasks,
                tasks: items.map((task) => {
                  if (String(task.id || "") !== taskId) return task;
                  const status = String(payload.status || "");
                  return {
                    ...task,
                    status: status === "passed" ? "child_archived" : status === "blocked" ? "blocked" : "failed",
                    child_wtree: String(payload.child_wtree || task.child_wtree || ""),
                    branch_ref: String(payload.branch_ref || task.branch_ref || ""),
                    worktree_path: String(payload.worktree_path || task.worktree_path || ""),
                    merge_target: String(payload.merge_target || task.merge_target || ""),
                    merge_lease_id: String(payload.merge_lease_id || task.merge_lease_id || ""),
                    merge_commit: String(payload.merge_commit || task.merge_commit || "")
                  };
                })
              };
            }
            function transitionKey(stageId, payload, tasks, resolved, args) {
              switch (stageId) {
                case "planning": {
                  return Array.isArray(payload.questions) && payload.questions.length ? "questions" : "planned";

                }
                case "awaiting_user_answers":
                  return "answered";
                case "plan_review": {
                  if (payload.approved === false) return "rejected";
                  return String(tasks.prompt || "").trim().toLowerCase().startsWith("loopship: execute child task ")
                    ? "child_approved"
                    : "approved";

                }
                case "task_graph_ready": {
                  const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];
                  const done = new Set(["child_merged", "child_archived", "done", "merged"]);
                  const terminal = items.length > 0 && items.every((task) => {
                    if (!done.has(String(task.status || ""))) return false;
                    if (["child_archived", "child_merged"].includes(String(task.status || ""))) {
                      return Boolean(String(task.merge_commit || "").trim());
                    }
                    return true;
                  });
                  return terminal ? "complete" : "partial";

                }
                case "executing": {
                  const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];
                  const done = new Set(["child_merged", "child_archived", "done", "merged"]);
                  const terminal = items.length > 0 && items.every((task) => {
                    if (!done.has(String(task.status || ""))) return false;
                    if (["child_archived", "child_merged"].includes(String(task.status || ""))) {
                      return Boolean(String(task.merge_commit || "").trim());
                    }
                    return true;
                  });
                  return terminal ? "complete" : "partial";

                }
                case "validating": {
                  if (payload.status === "passed") return "passed";
                  return String(tasks.prompt || "").trim().toLowerCase().startsWith("loopship: execute child task ")
                    ? "failed_child"
                    : "failed";

                }
                case "verification_pending": {
                  return payload.status === "passed" ? "passed" : "failed";

                }
                case "system_update_pending":
                  return "updated";
                case "landing_ready": {
                  return payload.status === "blocked" ? "blocked" : "landed";

                }
                case "replanning": {
                  return Array.isArray(payload.questions) && payload.questions.length ? "questions" : "planned";

                }
                case "archived":
                  return "continue";
                default:
                  return "continue";
              }
            }
            const resolved = object(state.steps.resolve_stage?.action);
            const currentStage = String(resolved.current_stage || args.stage || flow.default_stage);
            const stage = flow.stages.find((item) => item.id === currentStage) ||
              flow.stages.find((item) => item.id === flow.default_stage);
            const taskName = stageTaskNames[stage.id];
            const stageAction = object(state.steps[taskName]?.action);
            const workflowOutput = object(stageAction.result?.output || stageAction.workflow?.output);
            const payload = decisionPayload(workflowOutput);
            const tasks = object(state.steps.read_tasks?.action);
            const stepId = inputStepByStage[stage.id] || stage.step;
            const transitionTasks = tasksAfterPayload(tasks, payload, stepId);
            const key = transitionKey(stage.id, payload, transitionTasks, resolved, args);
            const transitions = object(stage.transitions);
            const targetStage = transitions[key] || stage.id;
            return {
              schema_version: "loopship.flow-transition/v1",
              flow_id: flow.id,
              stage_before: stage.id,
              stage_after: targetStage,
              transition: key,
              step: stepId,
              step_workflow_task: taskName,
              step_payload: payload,
              step_action: stageAction,
              state_patch: {
                stage: targetStage
              },
              event_payload: {
                event: "stage_changed",
                stage: targetStage,
                transition: key,
                step: stepId,
                stage_before: stage.id,
                stage_after: targetStage
              },
              runtime: resolved.runtime || {
                tasks,
                manifest: null,
                events: state.steps.query_events?.action || []
              }
            };
      output:
        schema:
          document:
            type: object
            additionalProperties: true
        as: ${action.value}
