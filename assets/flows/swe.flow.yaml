schema_version: 1
id: swe
version: 1
default_stage: planning
stages:
  planning:
    step: plan
    transitionKey:
      kind: js
      code: >
        return Array.isArray(payload.questions) && payload.questions.length ?
        "questions" : "planned";
    transitions:
      questions: awaiting_user_answers
      planned: plan_review
  awaiting_user_answers:
    step: questions
    transitionKey:
      kind: static
      value: answered
    transitions:
      answered: planning
  plan_review:
    step: task_graph
    transitionKey:
      kind: js
      code: >
        if (payload.approved === false) return "rejected";

        return String(tasks.prompt ||
        "").trim().toLowerCase().startsWith("loopship: execute child task ")
          ? "child_approved"
          : "approved";
    transitions:
      approved: task_graph_ready
      child_approved: validating
      rejected: planning
  task_graph_ready:
    step: executing
    transitionKey:
      kind: js
      code: >
        const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];

        const done = new Set(["child_merged", "child_archived", "done",
        "merged"]);

        const terminal = items.length > 0 && items.every((task) => {
          if (!done.has(String(task.status || ""))) return false;
          if (["child_archived", "child_merged"].includes(String(task.status || ""))) {
            return Boolean(String(task.merge_commit || "").trim());
          }
          return true;
        });

        return terminal ? "complete" : "partial";
    transitions:
      complete: validating
      partial: task_graph_ready
  executing:
    step: child_result
    transitionKey:
      kind: js
      code: >
        const items = Array.isArray(tasks.tasks) ? tasks.tasks : [];

        const done = new Set(["child_merged", "child_archived", "done",
        "merged"]);

        const terminal = items.length > 0 && items.every((task) => {
          if (!done.has(String(task.status || ""))) return false;
          if (["child_archived", "child_merged"].includes(String(task.status || ""))) {
            return Boolean(String(task.merge_commit || "").trim());
          }
          return true;
        });

        return terminal ? "complete" : "partial";
    transitions:
      complete: validating
      partial: executing
  validating:
    step: validation
    transitionKey:
      kind: js
      code: >
        if (payload.status === "passed") return "passed";

        return String(tasks.prompt ||
        "").trim().toLowerCase().startsWith("loopship: execute child task ")
          ? "failed_child"
          : "failed";
    transitions:
      passed: verification_pending
      failed: task_graph_ready
      failed_child: validating
  verification_pending:
    step: verification
    transitionKey:
      kind: js
      code: |
        return payload.status === "passed" ? "passed" : "failed";
    transitions:
      passed: system_update_pending
      failed: validating
  system_update_pending:
    step: system_update
    transitionKey:
      kind: static
      value: updated
    transitions:
      updated: landing_ready
  landing_ready:
    step: landing
    transitionKey:
      kind: js
      code: |
        return payload.status === "blocked" ? "blocked" : "landed";
    transitions:
      landed: archived
      blocked: landing_ready
  replanning:
    step: plan
    transitionKey:
      kind: js
      code: >
        return Array.isArray(payload.questions) && payload.questions.length ?
        "questions" : "planned";
    transitions:
      planned: plan_review
      questions: awaiting_user_answers
  archived:
    step: archived
    transitionKey:
      kind: static
      value: continue
    transitions: {}
subflows:
  - id: replanning
    type: in_flow_detour
    starts_at: replanning
    returns_to: plan_review
    trigger: replan
  - id: add_task
    type: in_flow_detour
    starts_at: replanning
    returns_to: task_graph_ready
    trigger: add_task
  - id: child_task
    type: spawned_quest
    starts_at: task_graph_ready
    returns_to: task_graph_ready
    trigger: children[].commands.init
    result_step: child_result
    flow_id: swe
