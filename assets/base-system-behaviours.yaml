schema_version: 1
behaviours:
  - id: system-behaviours-schema-contract
    statement: >-
      A Loopo system behaviours document uses schema_version 1, contains a
      behaviours array, contains a pending_proposals array, and each behaviour
      has id, statement, and test_refs fields.
    test_refs:
      - scripts/verify_coherency.ts
    source_refs:
      - schemas/system-behaviours.v1.json

  - id: system-doc-scaffold
    statement: >-
      Runtime initialization scaffolds the root system index plus high-level
      design, low-level design, architecture, system behaviours, and design
      system documents under .loopo/docs when they are missing.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo_core.ts

  - id: root-manifest-receipt-chain
    statement: >-
      Root system documents are protected by .loopo/manifest.sign.json, which
      records SHA-256 file digests, request id, writer command, previous receipt
      head, and current receipt head; missing, tampered, unmanaged, or
      receipt-chain-mismatched root files fail verification.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo_core.ts

  - id: quest-manifest-receipt-chain
    statement: >-
      Each quest has a manifest.sign.json receipt chain over tasks.yaml,
      plan.yaml, JSONL sidecars, hook events, and child files; missing,
      tampered, unmanaged, or receipt-chain-mismatched quest files block quest
      continuation.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo_core.ts

  - id: launcher-entrypoint
    statement: >-
      The user-facing launcher contract for loopo-prefixed work is loopo init
      with cwd and runtime, followed by schema-valid loopo quest next payloads;
      agents must not edit .loopo/** directly.
    test_refs:
      - scripts/verify_coherency.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - /Volumes/Projects/business/AstronLab/omar391/ai-rules/skills/loopo/SKILL.md
      - agents/openai.yaml
      - references/core/architecture.md

  - id: v3-command-surface
    statement: >-
      The public Loopo command surface is init, doctor, quest next, quest
      help, hook, and sim; quest state only advances through schema-valid V3
      payloads.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo.ts

  - id: public-usage-surface
    statement: >-
      CLI usage exposes init, quest next, quest help, hook, doctor, and sim
      entrypoints for direct public operation; cmdproto mirrors that same
      command set through loopo cmdproto execjson as a transparent wrapper
      without replacing the direct CLI or V3 payload authority.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo.ts
      - README.md

  - id: cmdproto-transparent-wrapper
    statement: >-
      The cmdproto wrapper exposes the current public Loopo command paths
      through loopo cmdproto execjson and cmdproto help surfaces, while
      delegating execution back to the direct command logic instead of
      mutating Loopo state through a second runtime implementation.
    test_refs:
      - scripts/verify_cmdproto_abi.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_cmdproto.ts
      - proto/loopo/v1/loopo.proto
      - references/core/architecture.md

  - id: init-installer-mode
    statement: >-
      loopo init without an objective runs doctor in fix mode, ensures system
      scaffolding, writes or refreshes the global loopo skill launcher, reports
      installer mode, and prints touched system and skill files.
    test_refs:
      - scripts/verify_runtime_hooks.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_core.ts

  - id: init-route-output
    statement: >-
      loopo init with an objective ensures runtime scaffolding, ranks candidate
      quests, suggests a slug, and returns an init_route containing a
      select_quest create_quest payload instead of directly creating the quest.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/init-output.v3.json

  - id: quest-candidate-ranking
    statement: >-
      Init candidate ranking tokenizes the incoming request and existing quest
      slugs/prompts, ignores short tokens and loopo, scores token overlap, and
      sorts by descending score then slug.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts

  - id: quest-creation-gate
    statement: >-
      A missing quest slug can only be created by a select_quest payload whose
      action is create_quest, whose slug matches --slug, and whose request is
      non-empty; otherwise loopo emits a V3 error.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/next-input.v3.json

  - id: quest-creation-effects
    statement: >-
      Creating a quest writes tasks.yaml, plan.yaml, JSONL sidecars,
      children/, an initial quest_started handoff, a quest manifest, a
      coordinator workspace, active slug state, and active-session pointers.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_core.ts

  - id: coordinator-workspace
    statement: >-
      Coordinator workspaces live at worktrees/<slug>; Loopo reuses an existing
      worktree by path or branch, creates a branch named after the slug from
      HEAD when possible, creates a plain directory when no Git commit exists,
      and refuses a non-empty unmanaged target path.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo_core.ts

  - id: slug-locking
    statement: >-
      loopo quest next serializes mutations per slug with .loopo/locks, returns
      a lock_error response containing retry details when a live owner exists,
      reaps stale locks, and releases owned locks best effort after handling.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/lock-error.v3.json

  - id: flow-and-step-schema-loading
    statement: >-
      Flow YAML and step definition YAML are schema validated before use; Loopo
      rejects missing step schemas, unknown flows, duplicate stages, bad
      transitions, incoherent subflows, and spawned subflows whose result step
      does not match the return stage input.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo_flow.ts
      - schemas/flow.v1.json
      - schemas/step-definition.v1.json

  - id: swe-flow-lifecycle
    statement: >-
      The bundled swe flow starts in planning and progresses through
      awaiting_user_answers, plan_review, task_graph_ready or executing,
      validating, verification_pending, system_update_pending, landing_ready,
      and archived according to the flow transition table.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - assets/flows/swe.yaml

  - id: lifecycle-step-definitions-authoritative
    statement: >-
      Step instructions and lifecycle metadata live in assets/steps/*.yaml;
      the flow determines executable stages and the step YAML determines the
      handler, input step, input schema, output schema, summary, and
      instructions for each step.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_coherency.ts
    source_refs:
      - assets/steps/plan.yaml
      - assets/steps/executing.yaml
      - references/core/architecture.md

  - id: step-instructions-self-scoped
    statement: >-
      Each bundled step definition instruction block contains exactly one
      self-named Loopo step heading and does not narrate managed state
      transitions, name raw lifecycle state ids, or embed instructions for
      other steps.
    test_refs:
      - scripts/verify_coherency.ts
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - assets/steps/plan.yaml
      - assets/steps/task-graph.yaml
      - assets/steps/verification.yaml
      - scripts/loopo_flow.ts

  - id: replanning-detours
    statement: >-
      Replanning and add_task are in-flow detours that start at replanning;
      replanning returns to plan_review, while add_task returns to
      task_graph_ready.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - assets/flows/swe.yaml

  - id: child-subflow-contract
    statement: >-
      Child task execution is modeled as a spawned_quest subflow that starts
      from task_graph_ready via children[].commands.init and returns to the
      parent task_graph_ready stage through a child_result payload. Each child
      launch is a dedicated CLI agent session, not inline execution by the
      parent coordinator.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_coherency.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - assets/flows/swe.yaml
      - references/core/architecture.md

  - id: step-output-shape
    statement: >-
      Quest step output is compact by default and includes slug, flow id,
      flow version, state, current step context, next command, transitions, and
      a note to request --full; --full adds schema ids, schemas, docs, help,
      summaries, and allowed transitions.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/step-output.v3.json

  - id: v3-schema-strictness
    statement: >-
      Current-step payloads and full step outputs are validated against the
      bundled V3 schemas; step schemas reject additional fields and schema
      violations return schema-valid error-output rather than mutating quest
      state.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_schema.ts
      - schemas/steps/common.v3.json

  - id: current-step-input-gating
    statement: >-
      Existing quests verify the root manifest, verify the quest manifest,
      require the submitted step to match the current stage input step, and
      validate the payload against that stage's input schema before a handler
      mutates state.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo.ts

  - id: plan-required-fields
    statement: >-
      Plan input must include classification, scope, AF fields, OF fields,
      verification_targets, and task_graph; when it is not asking questions it
      must also include task_graph.tasks.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/plan-input.v3.json

  - id: greenfield-ambiguity-gate
    statement: >-
      Greenfield app plans with unresolved high-impact unknowns are rejected
      unless the plan asks clarification questions or explicitly records
      defaults for those unknowns.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts
      - assets/steps/plan.yaml

  - id: plan-clarification-round
    statement: >-
      A plan payload with questions appends a question_round event to
      questions.jsonl and transitions the quest to awaiting_user_answers.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts
      - assets/steps/questions.yaml

  - id: questions-answer-round
    statement: >-
      The questions step requires an answers array, appends an answers event to
      questions.jsonl, preserves the quest slug, and returns the quest to
      planning.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/questions-input.v3.json

  - id: plan-materialization
    statement: >-
      A plan payload without questions appends a plan event, renders plan.yaml,
      applies task_graph.tasks into tasks.yaml, records assumptions and
      constraints, and transitions to plan_review.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_core.ts

  - id: task-normalization-defaults
    statement: >-
      Planned tasks are normalized by slugifying ids and defaulting type,
      child status, branch ref, worktree path, child slug, merge target,
      merge lease id, system impact ref, acceptance, and list fields when
      the plan omits them.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo_core.ts
      - schemas/tasks.v3.json

  - id: task-graph-review
    statement: >-
      The task_graph step requires an approved boolean; rejection records a
      task_graph_rejected event and returns to planning, while approval records
      task_graph_approved, requires at least one task, and transitions to
      task_graph_ready.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/task-graph-input.v3.json

  - id: task-graph-rejection-reason
    statement: >-
      A task_graph rejection is schema-valid only when it includes
      replan_reason, making failed graph approval an explicit replanning handoff
      rather than an unstructured boolean toggle.
    test_refs:
      - scripts/verify_flow_schema.test.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - schemas/steps/task-graph-input.v3.json
      - assets/steps/task-graph.yaml

  - id: child-one-task-one-worktree
    statement: >-
      Each planned task maps to exactly one dedicated child CLI-agent flow and
      one child worktree; executing instructions call for launching dedicated
      child CLI agent sessions for independent tasks and reject hidden task
      splitting or inline child execution by the parent session.
    test_refs:
      - scripts/verify_coherency.ts
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - assets/steps/executing.yaml
      - references/core/architecture.md

  - id: ready-child-selection
    statement: >-
      Executing output selects child tasks whose status is child_received,
      pending, or ready, whose dependencies are done, and whose selected set
      does not conflict on concurrency_group or scope_files.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts

  - id: child-dispatch-output
    statement: >-
      Executing output emits one ready child command per selected task, with
      child_slug <parent-slug>-<task-id>, loopo init and quest next commands,
      init forced to that child slug and flow id, cwd set to the task worktree
      or repo root, runtime all, and result schema child-result-input.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/child-dispatch-output.v3.json

  - id: child-result-required-fields
    statement: >-
      child_result input requires task_id, child_slug, status, and evidence;
      missing any required field returns a V3 error without advancing the
      lifecycle.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/child-result-input.v3.json

  - id: child-result-status-effects
    statement: >-
      A passed child_result marks the task child_archived, a blocked result
      marks it blocked, and any other non-passed status marks it failed while
      preserving child slug, branch, worktree, merge target, merge lease, and
      merge commit details.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_core.ts

  - id: child-result-advancement
    statement: >-
      child_result appends evidence to evidence.jsonl and advances to
      validating only when every task has a done status; otherwise it rewrites
      the quest manifest and returns the current executing state.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo.ts

  - id: child-done-status-set
    statement: >-
      The child statuses child_merged, child_archived, done, and merged count
      as complete for dependency gating, all-tasks-done checks, and hook
      terminal-state checks.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts

  - id: child-lifecycle-status-model
    statement: >-
      The central architecture reference models child task progress as child_received,
      child_executing, child_validating, child_verification_pending,
      child_landing_ready, child_merged, and child_archived, while the runtime
      accepts child_result statuses passed, blocked, and failed from children.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - references/core/architecture.md
      - schemas/steps/child-result-input.v3.json

  - id: validation-transition
    statement: >-
      The validation step accepts only status passed or failed, appends the
      validation payload to validation.jsonl, advances passed validation to
      verification_pending, and sends failed validation back to task_graph_ready.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/validation-input.v3.json

  - id: verification-transition
    statement: >-
      The verification step accepts only status passed or failed, appends the
      verification payload to review.jsonl, advances passed verification to
      system_update_pending, and sends failed verification back to validating.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/verification-input.v3.json

  - id: system-update-transition
    statement: >-
      The system_update step requires a system_update payload, appends a
      system_update review event, applies validated system doc updates through
      the binary, refreshes the root system index and manifest, and advances to
      landing_ready.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_core.ts
      - schemas/steps/system-update-input.v3.json

  - id: system-update-schema-contract
    statement: >-
      System update payloads require schema_version 1 and an updates array;
      each update targets one of the supported system doc ids and includes a
      summary, with additional update metadata preserved for renderers that
      understand it.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - schemas/system-update.v1.json
      - schemas/steps/system-update-input.v3.json
      - scripts/loopo_core.ts

  - id: system-behaviour-update-rendering
    statement: >-
      System updates to system-behaviours render explicit behaviours when
      provided, otherwise use the update summary as a behaviour statement,
      slugify behaviour ids, and carry test_refs from update test_refs or refs.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
    source_refs:
      - scripts/loopo_core.ts
      - schemas/system-update.v1.json

  - id: landing-transition
    statement: >-
      The landing step accepts only status landed or blocked, appends a landing
      event, performs the real git merge from the coordinator branch into the
      quest landing target when landed, records the landed commit and merge
      strategy in canonical quest state, archives the quest when landed, and
      remains landing_ready when blocked.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - scripts/loopo.ts
      - schemas/steps/landing-input.v3.json

  - id: archived-stage-read-only
    statement: >-
      The archived step has no input schema, emits archive-output, and is
      intended to report final state only without mutating .loopo/** directly.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_flow_schema.test.ts
    source_refs:
      - assets/steps/archived.yaml
      - schemas/steps/archive-output.v3.json

  - id: jsonl-event-history
    statement: >-
      Quest sidecar JSONL files are the event history for question rounds,
      plans, evidence, validation, review, handoffs, and hook events; handlers
      append records rather than replacing the entire sidecar history.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_quest_contract.ts
    source_refs:
      - scripts/loopo.ts
      - scripts/loopo_core.ts

  - id: canonical-ledger-detection
    statement: >-
      Canonical quest state lives at `.loopo/quests/<slug>/tasks.yaml`; Loopo
      does not read alternate markdown ledgers.
    test_refs:
      - scripts/verify_coherency.ts
    source_refs:
      - scripts/loopo_utils.ts
      - scripts/loopo_core.ts

  - id: active-session-resolution
    statement: >-
      After creation and every quest next response, Loopo stores the active slug
      in .loopo/state.json and writes git-dir loopo-active-session pointers for
      the repo root, command cwd, and coordinator workspace when available.
    test_refs:
      - scripts/verify_child_agent_integration.test.ts
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts

  - id: hook-active-quest-selection
    statement: >-
      Runtime hooks resolve the active quest from --slug, payload slug,
      git-dir active-session pointers for the session cwd or repo root,
      .loopo/state.json, or the most recently modified quest; when no active
      quest exists the hook emits an empty JSON object.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts
      - references/core/architecture.md

  - id: hook-manifest-guard
    statement: >-
      Runtime hook continuation is suppressed when the selected quest manifest
      fails verification, so hooks do not continue from tampered or incomplete
      managed quest state.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts
      - references/core/architecture.md

  - id: hook-snapshot-duplicate-suppression
    statement: >-
      Hook duplicate suppression keys include runtime, hook event name,
      context root, active quest slug, latest iteration, and a fingerprint of
      tasks, plan, sidecars, and child files; duplicate same-state events emit
      no continuation.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts
      - references/core/architecture.md

  - id: hook-continuation-rules
    statement: >-
      Hooks continue when stop_reason is none and tasks are not all stalled;
      all_done is terminal only when the task table is all done, and
      all_blocked_or_deferred is terminal only when the task table is all
      stalled; archived quests and other stop reasons do not continue.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts
      - references/core/architecture.md

  - id: hook-continuation-budget
    statement: >-
      Each runtime/context-root/quest hook chain may continue automatically for
      12 non-terminal turns; once exhausted, Loopo emits one budget_exhausted
      continuation prompt and then suppresses further continuation for the same
      unchanged chain.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts
      - references/core/architecture.md

  - id: hook-runtime-output-mapping
    statement: >-
      Continuation output maps to the runtime surface: Codex receives
      decision block, Gemini receives decision deny with suppressOutput, and
      Copilot Stop receives both flat block fields and hookSpecificOutput.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts
      - references/core/architecture.md

  - id: hook-event-audit
    statement: >-
      Hook decisions append audit records to hook-events.jsonl with runtime,
      event, stage, iteration, stop reason, task state, decision, continuation
      count or snapshot fingerprint when applicable, and then refresh the quest
      manifest.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts

  - id: doctor-health-check
    statement: >-
      loopo doctor checks for .loopo/state.json, the global loopo shim, a valid
      root system manifest, and runtime hook configs; without --fix it reports
      healthy or issues and exits nonzero when repair is needed.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts

  - id: doctor-fix
    statement: >-
      loopo doctor --fix ensures state and system scaffolding, creates the
      global loopo shim, installs requested runtime hooks, and reports every
      written system or hook file.
    test_refs:
      - scripts/verify_runtime_hooks.ts
    source_refs:
      - scripts/loopo.ts

