schema_version: 1
id: plan
handler: plan
input_step: plan
input_schema: plan-input
output_schema: step-output
summary: Submit a decision-complete plan payload using AF/OF fields. Ask or default every high-impact unknown.
instructions: |-
  # Loopo Plan Step

  Use this protocol whenever the current step output requests a `plan` payload.

  ## Goal

  - Own clarification natively inside `loopo`.
  - Turn natural-language targets into a decision-complete execution spec.
  - Use repo discovery first, then ask only unresolved but materially relevant
    questions.

  ## Plan Classifier

  Classify the request before planning:

  1. greenfield app or product build
  2. feature or addition to an existing quest
  3. bugfix or regression
  4. refactor or cleanup
  5. general non-coding task

  ## Required Flow

  1. Discover repo and runtime facts first when local context exists.
  2. Build a relevance-bounded clarification matrix.
  3. Ask grouped question rounds until all high-impact unknowns are answered or
     explicitly defaulted. If the runtime exposes a structured
     `request_user_input`-style tool, prefer it; otherwise ask one concise
     grouped natural-language round.
  4. Apply AF to challenge contradictions, hidden assumptions, weak reasoning,
     and missing edge cases.
  5. Apply OF to collapse answers into deterministic scope, constraints,
     acceptance, and decomposition inputs.
  6. Submit the decision-complete `plan` payload through
     `loopo quest next --slug <slug> --json @-`; the binary owns creation and
     mutation of `.loopo/quests/{slug}/tasks.yaml`.

  ## Question Rounds

  - Use `request_user_input` only when the runtime exposes it and the remaining
    ambiguity is genuinely high impact.
  - Keep each round to 1-3 short questions, grouped by related ambiguity.
  - Make each question answerable with 2-3 mutually exclusive choices; put the
     recommended choice first and rely on the tool's automatic `Other` choice
     instead of inventing a catchall.
  - Prefer one concise grouped round over serial single-question turns whenever
     the next question does not depend on the previous answer.
  - Prefer explicit low-risk defaults only when no clarification round is
    needed and the unresolved choice is reversible and low impact.
  - In headless or auto-continued CLI runs, if you emit a clarification round,
    stop and wait indefinitely for a human answer instead of auto-accepting
    defaults after asking.

  ## Clarification Dimensions

  Cover each dimension when relevant:

  - goal and success outcome
  - users, personas, and stakeholders
  - primary business cases and workflows
  - corner cases and failure cases
  - business rules, policies, and implications
  - data, state, storage, and migration implications
  - integrations and external dependencies
  - security, privacy, compliance, reliability, and performance requirements
  - UX and product expectations for app or dashboard requests
  - operational constraints and rollout constraints
  - verification expectations and acceptance criteria
  - explicit out-of-scope boundaries

  ## Request-Type Rules

  Greenfield app or product requests:

  - Perform full product-design expansion before task decomposition.
  - Ask across product, UX, data, operational, and verification dimensions.
  - Treat prompts like `create a fullstack app`, `build a website`, or `make a
    tool` as unresolved product-definition requests.
  - For those generic prompts, the first plan response must emit a
    clarification round through `questions` and keep `task_graph.tasks` empty.
  - Do not invent domain, stack, persistence, auth, or primary workflow in
    `scope` unless the prompt already constrained them or the user answered
    them in the current clarification history.

  Bugfix or regression requests:

  - Inspect repo and likely repro surface before asking questions.
  - Limit questioning to unresolved behavior, constraints, expected outcome, and
    regression boundaries.

  Feature or delta requests:

  - Re-run planning only for the changed dimensions.
  - Preserve previously settled scope and evidence unless the delta invalidates
    them.

  ## Task Graph Sizing

  - Prefer the smallest task graph that can finish deterministically.
  - Prefer a serial task graph by default. Only create parallel-ready branches
    when the work is clearly independent, the file scope is disjoint, and real
    multi-agent execution is available.
  - For tiny utilities, one-file tools, and narrow greenfield apps, keep the
    graph to 1-2 tasks unless a split is required by file ownership, merge
    safety, or materially different acceptance criteria.
  - For a small prototype or first version, keep the graph to 1-3 concrete
    tasks. Do not split scaffolding, implementation, and final verification
    into separate child tasks unless the acceptance boundaries genuinely differ.
  - When the request still requires implementation work, the task graph must
    contain at least one concrete task. Do not submit an empty `task_graph`
    just because the scope is small.
  - Do not split setup, implementation, and tests into separate child tasks
    when one competent worker can complete them in one bounded pass.

  ## Defaulting Rules

  - Do not submit executable decomposition while high-impact ambiguity remains.
  - Generic greenfield product prompts are not low-risk defaults. Ask the first
    clarification round before decomposing them into tasks.
  - If only low-impact details remain unresolved, proceed with explicit
    defaults.
  - Once you ask a clarification round, do not auto-answer it. Wait for the
    user's response before continuing any decomposition that depends on it.
  - Record defaults, assumptions, and unresolved risks through the schema-valid
    `plan` payload so they land in canonical YAML/JSONL state.

  ## Plan Payload Output

  The plan phase must produce:

  - a refined scope statement
  - explicit constraints
  - explicit assumptions and defaults
  - verification targets
  - decomposition inputs for `general` and `coding` tasks where applicable
  - the smallest viable task graph for the scoped work
