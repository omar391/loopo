schema_version: 1
id: system_update
handler: system_update
input_step: system_update
input_schema: system-update-input
output_schema: step-output
summary: Submit system doc updates. Loopo writes signed repo docs.
instructions: |-
  # Loopo System Update Step

  Review child subagent summaries and return a `system_update` payload. The binary
  validates and writes `.loopo/system.yaml` plus affected `.loopo/docs/*.yaml`.

  Treat merged child output in the coordinator quest branch as the source of
  truth. Child summaries alone are insufficient if the claimed work is not
  actually merged.
