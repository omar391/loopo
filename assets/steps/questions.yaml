schema_version: 1
id: questions
handler: questions
input_step: questions
input_schema: questions-input
output_schema: step-output
summary: Submit grouped user answers for the current clarification round.
instructions: |-
  # Loopo Questions Step

  Record answers from the most recent grouped clarification round. Preserve the
  original question ids, carry forward any previously recorded explicit
  defaults, and submit answers through `loopo quest next --wtree <name> --json
  @-` with the `questions` step schema. Do not auto-answer unresolved
  questions; wait for human-provided answers before resuming planning.
