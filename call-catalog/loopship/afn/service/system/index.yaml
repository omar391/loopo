schemaVersion: fastflow/call-catalog-scope/v1
calls:
  - call: loopship.afn.service.system.apply
    summary: Apply Loopship system document updates and refresh managed signatures.
    inputs:
      required:
        - repo
        - update
      optional:
        - request_id
        - actor
        - reason
        - dry_run
      schema:
        type: object
        additionalProperties: false
        required:
          - repo
          - update
        properties:
          repo:
            type: string
            minLength: 1
          update:
            type: object
            additionalProperties: false
            required:
              - schema_version
              - mode
              - summary
            properties:
              schema_version:
                const: 1
              mode:
                enum: [no_change, replace]
              summary:
                type: string
                minLength: 1
              root:
                type: object
                additionalProperties: true
              external_docs:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - op
                    - resource_ref
                  properties:
                    op:
                      enum: [upsert, delete]
                    resource_ref:
                      type: string
                      minLength: 1
                    document:
                      type: object
                      additionalProperties: true
          request_id:
            type: string
          actor:
            type: string
          reason:
            type: string
          dry_run:
            type: boolean
    tags:
      - loopship
      - system
      - docs
      - signature
    preferWhen:
      - "A Loopship workflow needs to apply schema-aware system document changes."
    avoidWhen:
      - "The workflow only needs to read or draft system document updates."
    metadata:
      allowed_phases:
        - action
      effects:
        - file.write
        - signature.write
