schemaVersion: fastflow/call-catalog-scope/v1
calls:
  - call: loopship.afn.service.child.prepare
    summary: Prepare Loopship child quest/worktree launch context without running
      the child agent.
    inputs:
      required:
        - repo
        - wtree
      optional:
        - task_id
        - task
        - children
        - parent
        - runtime
        - branch
        - base_branch
        - child_wtree
        - worktree_path
        - dry_run
      schema:
        type: object
        additionalProperties: false
        required:
          - repo
          - wtree
        properties:
          repo:
            type: string
            minLength: 1
          wtree:
            type: string
            minLength: 1
          child_wtree:
            type: string
          task_id:
            type: string
          task:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
              task_id:
                type: string
              title:
                type: string
              name:
                type: string
              type:
                enum:
                  - coding
                  - general
              status:
                type: string
              dependencies:
                type: array
                items:
                  type: string
              depends_on:
                type: array
                items:
                  type: string
              scope_files:
                type: array
                items:
                  type: string
              scope:
                type: array
                items:
                  type: string
              spec_refs:
                type: array
                items:
                  type: string
              specs:
                type: array
                items:
                  type: string
              context_refs:
                type: array
                items:
                  type: string
              context:
                type: array
                items:
                  type: string
              branch_ref:
                type: string
              worktree_path:
                type: string
              child_wtree:
                type: string
              parent_wtree:
                type: string
              parent_task_id:
                type: string
              parent_context_ref:
                type: string
              concurrency_group:
                type: string
              merge_target:
                type: string
              merge_target_worktree:
                type: string
              merge_lease_id:
                type: string
              merge_commit:
                type: string
              system_impact_ref:
                type: string
              commands:
                type: object
                additionalProperties: true
              result_schema:
                oneOf:
                  - type: string
                  - type: object
                    additionalProperties: true
              acceptance:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
              acceptance_criteria:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
          children:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                task_id:
                  type: string
                title:
                  type: string
                name:
                  type: string
                type:
                  enum:
                    - coding
                    - general
                status:
                  type: string
                dependencies:
                  type: array
                  items:
                    type: string
                depends_on:
                  type: array
                  items:
                    type: string
                scope_files:
                  type: array
                  items:
                    type: string
                scope:
                  type: array
                  items:
                    type: string
                spec_refs:
                  type: array
                  items:
                    type: string
                specs:
                  type: array
                  items:
                    type: string
                context_refs:
                  type: array
                  items:
                    type: string
                context:
                  type: array
                  items:
                    type: string
                branch_ref:
                  type: string
                worktree_path:
                  type: string
                child_wtree:
                  type: string
                parent_wtree:
                  type: string
                parent_task_id:
                  type: string
                parent_context_ref:
                  type: string
                concurrency_group:
                  type: string
                merge_target:
                  type: string
                merge_target_worktree:
                  type: string
                merge_lease_id:
                  type: string
                merge_commit:
                  type: string
                system_impact_ref:
                  type: string
                commands:
                  type: object
                  additionalProperties: true
                result_schema:
                  oneOf:
                    - type: string
                    - type: object
                      additionalProperties: true
                acceptance:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                acceptance_criteria:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
          parent:
            type: object
            additionalProperties: false
            properties:
              task_id:
                type: string
              parent_wtree:
                type: string
              parent_context_ref:
                type: string
              landing_target_branch:
                type: string
              landing_target_worktree:
                type: string
              merge_lease_id:
                type: string
          runtime:
            type: string
          branch:
            type: string
          base_branch:
            type: string
          worktree_path:
            type: string
          dry_run:
            type: boolean
    tags:
      - loopship
      - child
      - worktree
      - quest
    preferWhen:
      - A Loopship workflow needs to prepare child quest/worktree launch
        metadata.
    avoidWhen:
      - The workflow only needs planning, validation, verification, or model
        reasoning.
    metadata:
      allowed_phases:
        - action
      effects:
        - worktree.prepare
        - quest.prepare
