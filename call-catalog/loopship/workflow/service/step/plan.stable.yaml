document:
  dsl: 1.0.3
  namespace: service-step
  name: plan
  version: 0.1.0
  summary: "Submit a decision-complete plan payload with explicit system context. Ask or default every high-impact unknown."
  metadata:
    catalog:
      tags:
        - loopship
        - step
        - plan
input:
  schema:
    document:
      "$schema": "https://json-schema.org/draft/2020-12/schema"
      "$id": schemas/steps/step-output.yaml
      title: "Loopship V3 Step Output"
      type: object
      additionalProperties: false
      required:
        - step
        - output_schema
        - commands
      properties:
        schema_version:
          const: 3
        kind:
          const: quest_step
        schema_path:
          const: schemas/steps/step-output.yaml
        wtree:
          type: string
        quest_id:
          type: string
        flow_id:
          type: string
        flow_version:
          type: integer
        step:
          oneOf:
            - type: string
            - type: object
              additionalProperties: false
              required:
                - id
                - instructions
              properties:
                id:
                  type: string
                instructions:
                  type: string
        state:
          type: string
        summary:
          type: string
        output_schema:
          oneOf:
            - oneOf:
                - type: string
                - type: object
                  additionalProperties: false
                  required:
                    - schema_path
                  properties:
                    schema_path:
                      type: string
            - type: object
              additionalProperties: true
              required:
                - "$schema"
                - "$id"
              properties:
                "$schema":
                  type: string
                "$id":
                  type: string
                title:
                  type: string
                type: {}
                required:
                  type: array
                  items:
                    type: string
                properties:
                  type: object
        allowed_transitions:
          type: object
          additionalProperties:
            type: string
        context:
          type: object
          additionalProperties: false
          required:
            - step
          properties:
            step:
              type: object
              additionalProperties: false
              required:
                - schema_version
                - id
                - handler
                - input_step
                - input_schema
                - output_schema
                - result_schema_path
                - summary
                - instructions
              properties:
                schema_version:
                  const: 1
                id:
                  type: string
                handler:
                  type: string
                input_step:
                  type:
                    - string
                    - "null"
                input_schema:
                  oneOf:
                    - oneOf:
                        - oneOf:
                            - type: string
                            - type: object
                              additionalProperties: false
                              required:
                                - schema_path
                              properties:
                                schema_path:
                                  type: string
                        - type: object
                          additionalProperties: true
                          required:
                            - "$schema"
                            - "$id"
                          properties:
                            "$schema":
                              type: string
                            "$id":
                              type: string
                            title:
                              type: string
                            type: {}
                            required:
                              type: array
                              items:
                                type: string
                            properties:
                              type: object
                    - type: "null"
                output_schema:
                  oneOf:
                    - oneOf:
                        - oneOf:
                            - type: string
                            - type: object
                              additionalProperties: false
                              required:
                                - schema_path
                              properties:
                                schema_path:
                                  type: string
                        - type: object
                          additionalProperties: true
                          required:
                            - "$schema"
                            - "$id"
                          properties:
                            "$schema":
                              type: string
                            "$id":
                              type: string
                            title:
                              type: string
                            type: {}
                            required:
                              type: array
                              items:
                                type: string
                            properties:
                              type: object
                    - type: "null"
                result_schema_path:
                  type: string
                summary:
                  type: string
                instructions:
                  type: string
        commands:
          type: object
          additionalProperties: false
          required:
            - next
          properties:
            next:
              type: object
              additionalProperties: false
              required:
                - cmd
                - args
              properties:
                cmd:
                  type: string
                args:
                  type: array
                  items:
                    type: string
        docs:
          type: object
          additionalProperties: false
          required:
            - state_yaml
            - events_jsonl
            - manifest
          properties:
            state_yaml:
              type: string
            events_jsonl:
              type: string
            manifest:
              type: string
        requirements:
          type: array
          items:
            type: string
do:
